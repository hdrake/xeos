# Pinned environment for REGENERATING the reference truth fixtures (truth.json).
#
# This is intentionally separate from xeos's own runtime environment. Truth now
# comes primarily from MODEL SOURCE compiled/run on demand (MOM6 + MITgcm Fortran
# via gfortran; Oceananigans' SeawaterPolynomials.jl via julia), so the only heavy
# Python reference left is gsw (canonical TEOS-10). The frozen truth.json produced
# here is what the test suite consumes, so the regular tests stay lightweight.
#
# Versions below match what produced the committed truth.json (see its
# provenance.reference_versions block). Update both together when regenerating.
#
#   conda env create -f environment.yml
#   conda activate xeos-reference
#   python generate_truth.py
name: xeos-reference
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.11
  - numpy
  - gfortran       # compiles the MOM6 + MITgcm Fortran drivers
  - julia          # runs SeawaterPolynomials.jl for the idealized roquet-* forms
  - pip
  - pip:
      - gsw==3.6.23
# Julia packages (SeawaterPolynomials, JSON) are installed on first run into a
# dedicated, gitignored project env (xeos/tests/reference/_julia_env/) so they do
# not perturb -- or depend on -- the user's global Julia environment.
# Retired Python ports (now validated against model source instead): momlevel
# (wright97-*), fastjmd95 (jmd95), MITgcmutils (unesco/mdjwf).
